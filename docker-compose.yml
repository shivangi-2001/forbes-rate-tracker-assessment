# ── Shared healthcheck defaults ────────────────────────────────────────────────
x-healthcheck-defaults: &hc
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: rates
      POSTGRES_PASSWORD: rates
      POSTGRES_DB: rates_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      <<: *hc
      test: ["CMD-SHELL", "pg_isready -U rates -d rates_db"]
    ports:
      - "5432:5432"

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      <<: *hc
      test: ["CMD", "redis-cli", "ping"]
    ports:
      - "6379:6379"

  # ── Django API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://rates:rates@db:5432/rates_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/data:/app/data:ro   # mount seed parquet here
    healthcheck:
      <<: *hc
      # slim image has no curl; use stdlib (same Python as the app)
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/rates/latest', timeout=4)\"",
        ]
    ports:
      - "8000:8000"

  # ── Celery worker ────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://rates:rates@db:5432/rates_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    command: celery -A config worker --loglevel=info --concurrency=2

  # ── Celery beat (scheduler) ──────────────────────────────────────────────────
  celery_beat:
    build:
      context: ./backend
      target: runtime
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://rates:rates@db:5432/rates_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  # ── Next.js dashboard ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: runtime
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
